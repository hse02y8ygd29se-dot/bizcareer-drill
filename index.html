<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ビジキャリ3級 反復ドリル</title>
  <style>
    :root {
      --bg: #f7f9fb;
      --panel: #ffffff;
      --text: #17212b;
      --muted: #667085;
      --line: #d9e2ec;
      --blue: #2457a6;
      --blue-soft: #e9f1ff;
      --green: #13795b;
      --green-soft: #e8f6f0;
      --red: #b42318;
      --red-soft: #fff0ed;
      --amber: #96690f;
      --amber-soft: #fff7df;
      --shadow: 0 14px 32px rgba(23, 33, 43, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.65;
    }

    button, select {
      font: inherit;
    }

    .app {
      width: min(960px, 100%);
      margin: 0 auto;
      padding: 16px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      margin: -16px -16px 14px;
      padding: 14px 16px;
      background: rgba(247, 249, 251, 0.95);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .sub {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .count-badge {
      flex: 0 0 auto;
      padding: 6px 10px;
      border: 1px solid #b9c9de;
      border-radius: 999px;
      color: var(--blue);
      background: var(--blue-soft);
      font-size: 13px;
      font-weight: 700;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 14px 0;
    }

    .control {
      display: grid;
      gap: 5px;
    }

    label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    select {
      width: 100%;
      min-height: 42px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .btn {
      min-height: 44px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      font-weight: 700;
    }

    .btn.primary {
      border-color: var(--blue);
      color: #ffffff;
      background: var(--blue);
    }

    .btn.good {
      border-color: #9ed8c1;
      color: var(--green);
      background: var(--green-soft);
    }

    .btn.warn {
      border-color: #e6c875;
      color: var(--amber);
      background: var(--amber-soft);
    }

    .btn.danger {
      border-color: #f0b5af;
      color: var(--red);
      background: var(--red-soft);
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    .stat {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .stat .value {
      display: block;
      font-size: 18px;
      font-weight: 800;
      line-height: 1.2;
    }

    .stat .name {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .question-panel {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .tag {
      padding: 4px 8px;
      border-radius: 999px;
      background: var(--green-soft);
      color: var(--green);
      font-size: 12px;
      font-weight: 800;
    }

    .progress-text {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .bar {
      height: 8px;
      margin-bottom: 16px;
      overflow: hidden;
      border-radius: 999px;
      background: #edf1f5;
    }

    .bar > span {
      display: block;
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--blue), var(--green));
      transition: width 180ms ease;
    }

    .question {
      margin: 0 0 14px;
      font-size: 20px;
      font-weight: 800;
      line-height: 1.55;
      letter-spacing: 0;
    }

    .choices {
      display: grid;
      gap: 10px;
    }

    .choice {
      width: 100%;
      min-height: 54px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      font-weight: 650;
    }

    .choice.correct {
      border-color: #74c69d;
      background: var(--green-soft);
      color: var(--green);
    }

    .choice.wrong {
      border-color: #f0a19a;
      background: var(--red-soft);
      color: var(--red);
    }

    .choice[disabled] {
      cursor: default;
    }

    .result {
      display: none;
      margin-top: 14px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #f9fbfd;
    }

    .result.show {
      display: block;
    }

    .result-title {
      margin: 0 0 4px;
      font-size: 15px;
      font-weight: 800;
    }

    .result-note {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .panel-actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .tips {
      margin: 14px 0 0;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--muted);
      font-size: 14px;
    }

    .tips strong {
      color: var(--text);
    }

    .empty {
      display: none;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      text-align: center;
    }

    .empty.show {
      display: block;
    }

    @media (max-width: 720px) {
      .app { padding: 12px; }
      .topbar { margin: -12px -12px 12px; padding: 12px; }
      .controls { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .actions, .panel-actions { grid-template-columns: 1fr; }
      h1 { font-size: 18px; }
      .question { font-size: 18px; }
      .question-panel { padding: 14px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="title-row">
        <div>
          <h1>ビジキャリ3級 反復ドリル</h1>
          <p class="sub">マーケティング3級・経理3級を合格ライン優先で反復</p>
        </div>
        <span class="count-badge" id="totalBadge">180問</span>
      </div>
    </header>

    <section class="controls" aria-label="出題設定">
      <div class="control">
        <label for="subjectSelect">分野</label>
        <select id="subjectSelect">
          <option value="all">全分野</option>
          <option value="marketing">マーケティング</option>
          <option value="bookkeeping">経理 簿記・財務諸表</option>
          <option value="cost">経理 原価計算</option>
        </select>
      </div>
      <div class="control">
        <label for="modeSelect">出題モード</label>
        <select id="modeSelect">
          <option value="random">全問ランダム</option>
          <option value="mistakes">間違えた問題だけ</option>
          <option value="unmastered">未定着を優先</option>
          <option value="new">まだ解いていない問題</option>
        </select>
      </div>
      <div class="control">
        <label for="lengthSelect">1回の問題数</label>
        <select id="lengthSelect">
          <option value="10">10問</option>
          <option value="20" selected>20問</option>
          <option value="40">40問</option>
          <option value="999">できるだけ多く</option>
        </select>
      </div>
    </section>

    <section class="actions" aria-label="操作">
      <button class="btn primary" id="startBtn" type="button">この設定で始める</button>
      <button class="btn danger" id="resetBtn" type="button">成績をリセット</button>
    </section>

    <section class="stats" aria-label="成績">
      <div class="stat"><span class="value" id="sessionScore">0/0</span><span class="name">今回の正解</span></div>
      <div class="stat"><span class="value" id="allRate">0%</span><span class="name">累計正解率</span></div>
      <div class="stat"><span class="value" id="mistakeCount">0</span><span class="name">復習候補</span></div>
      <div class="stat"><span class="value" id="streakCount">0</span><span class="name">連続正解</span></div>
    </section>

    <section class="empty" id="emptyBox">
      <strong>この条件の問題がありません。</strong><br>
      分野やモードを変えて始めてください。
    </section>

    <section class="question-panel" id="quizPanel">
      <div class="meta">
        <span class="tag" id="subjectTag">準備中</span>
        <span class="progress-text" id="progressText">0 / 0</span>
      </div>
      <div class="bar"><span id="progressBar"></span></div>
      <p class="question" id="questionText">設定を選んで「この設定で始める」を押してください。</p>
      <div class="choices" id="choices"></div>
      <div class="result" id="resultBox">
        <p class="result-title" id="resultTitle"></p>
        <p class="result-note" id="resultNote"></p>
      </div>
      <div class="panel-actions">
        <button class="btn" id="nextBtn" type="button" disabled>次の問題</button>
        <button class="btn warn" id="againBtn" type="button">この問題を復習候補にする</button>
        <button class="btn good" id="clearMistakeBtn" type="button">復習候補から外す</button>
      </div>
    </section>

    <section class="tips">
      <strong>使い方:</strong>
      まずは全分野20問を何度か回します。間違いが増えてきたら「間違えた問題だけ」に切り替えます。
      経理は「簿記・財務諸表」と「原価計算」を分けて回すと、弱点が見つけやすいです。
    </section>
  </main>

      ["cost", "減損", "加工中に蒸発や粉散などで原料が減少すること"],
      ["cost", "完成品換算量", "期末仕掛品を完成品何個分に相当するかで表した数量"],
      ["cost", "工程別総合原価計算", "複数工程を経る製品について工程ごとに原価を計算する方法"],
      ["cost", "組別総合原価計算", "種類の異なる製品群を組別に連続生産する場合の計算方法"],
      ["cost", "等級別総合原価計算", "サイズや品質の違う同種製品を等価係数で計算する方法"],
      ["cost", "等価係数", "等級別総合原価計算で製品間の原価負担割合を示す係数"],
      ["cost", "連産品", "同一工程から必然的に複数の主要製品が生じるもの"],
      ["cost", "原価差異", "予定原価や標準原価と実際原価との差"],
      ["cost", "営業費計算", "販売費や一般管理費を分類、集計する計算"]
    ];

    const labels = {
      marketing: "マーケティング",
      bookkeeping: "経理 簿記・財務諸表",
      cost: "経理 原価計算"
    };

    const storage = (() => {
      try {
        const key = "bizcareer-drill-storage-test";
        window.localStorage.setItem(key, "1");
        window.localStorage.removeItem(key);
        return window.localStorage;
      } catch (error) {
        return null;
      }
    })();

    function loadSavedStore() {
      if (!storage) return {};
      try {
        return JSON.parse(storage.getItem("bizcareer-drill-stats") || "{}");
      } catch (error) {
        return {};
      }
    }

    const state = {
      allQuestions: [],
      session: [],
      currentIndex: 0,
      answered: false,
      sessionCorrect: 0,
      sessionAnswered: 0,
      streak: 0,
      store: loadSavedStore()
    };

    const subjectSelect = document.getElementById("subjectSelect");
    const modeSelect = document.getElementById("modeSelect");
    const lengthSelect = document.getElementById("lengthSelect");
    const startBtn = document.getElementById("startBtn");
    const resetBtn = document.getElementById("resetBtn");
    const nextBtn = document.getElementById("nextBtn");
    const againBtn = document.getElementById("againBtn");
    const clearMistakeBtn = document.getElementById("clearMistakeBtn");
    const quizPanel = document.getElementById("quizPanel");
    const emptyBox = document.getElementById("emptyBox");
    const subjectTag = document.getElementById("subjectTag");
    const progressText = document.getElementById("progressText");
    const progressBar = document.getElementById("progressBar");
    const questionText = document.getElementById("questionText");
    const choices = document.getElementById("choices");
    const resultBox = document.getElementById("resultBox");
    const resultTitle = document.getElementById("resultTitle");
    const resultNote = document.getElementById("resultNote");
    const sessionScore = document.getElementById("sessionScore");
    const allRate = document.getElementById("allRate");
    const mistakeCount = document.getElementById("mistakeCount");
    const streakCount = document.getElementById("streakCount");
    const totalBadge = document.getElementById("totalBadge");

    function shuffle(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function buildQuestions() {
      const bySubject = facts.reduce((map, item) => {
        const subject = item[0];
        map[subject] = map[subject] || [];
        map[subject].push(item);
        return map;
      }, {});

      const questions = [];
      facts.forEach(([subject, term, definition], index) => {
        const same = bySubject[subject].filter(item => item[1] !== term);
        const wrongDefs = shuffle(same).slice(0, 3).map(item => item[2]);
        const wrongTerms = shuffle(same).slice(0, 3).map(item => item[1]);
        questions.push({
          id: `d-${index}`,
          subject,
          prompt: `「${term}」の説明として最も適切なものはどれか。`,
          answer: definition,
          choices: shuffle([definition, ...wrongDefs]),
          note: `${term}: ${definition}`
        });
        questions.push({
          id: `t-${index}`,
          subject,
          prompt: `次の説明に当てはまる用語はどれか。\n${definition}`,
          answer: term,
          choices: shuffle([term, ...wrongTerms]),
          note: `${term}: ${definition}`
        });
      });
      return questions;
    }

    function saveStore() {
      if (!storage) return;
      try {
        storage.setItem("bizcareer-drill-stats", JSON.stringify(state.store));
      } catch (error) {
        // iPhoneでローカルHTMLを開いた場合など、保存できない環境では一時成績で続ける。
      }
    }

    function statFor(id) {
      if (!state.store[id]) {
        state.store[id] = { correct: 0, wrong: 0, seen: 0, mistake: false };
      }
      return state.store[id];
    }

    function filteredQuestions() {
      const subject = subjectSelect.value;
      const mode = modeSelect.value;
      let list = state.allQuestions;
      if (subject !== "all") {
        list = list.filter(q => q.subject === subject);
      }
      if (mode === "mistakes") {
        list = list.filter(q => statFor(q.id).mistake || statFor(q.id).wrong > 0);
      }
      if (mode === "unmastered") {
        list = list.filter(q => {
          const s = statFor(q.id);
          return s.correct < 2 || s.wrong > 0 || s.mistake;
        });
      }
      if (mode === "new") {
        list = list.filter(q => statFor(q.id).seen === 0);
      }
      return list;
    }

    function startSession() {
      state.sessionCorrect = 0;
      state.sessionAnswered = 0;
      state.streak = 0;
      state.currentIndex = 0;
      state.answered = false;
      const limit = Number(lengthSelect.value);
      const list = shuffle(filteredQuestions());
      state.session = list.slice(0, Math.min(limit, list.length));
      updateStats();
      if (!state.session.length) {
        quizPanel.style.display = "none";
        emptyBox.classList.add("show");
        return;
      }
      quizPanel.style.display = "";
      emptyBox.classList.remove("show");
      renderQuestion();
    }

    function renderQuestion() {
      const q = state.session[state.currentIndex];
      state.answered = false;
      subjectTag.textContent = labels[q.subject];
      progressText.textContent = `${state.currentIndex + 1} / ${state.session.length}`;
      progressBar.style.width = `${((state.currentIndex) / state.session.length) * 100}%`;
      questionText.textContent = q.prompt;
      choices.innerHTML = "";
      q.choices.forEach(choice => {
        const button = document.createElement("button");
        button.className = "choice";
        button.type = "button";
        button.textContent = choice;
        button.addEventListener("click", () => answerQuestion(choice));
        choices.appendChild(button);
      });
      resultBox.classList.remove("show");
      resultTitle.textContent = "";
      resultNote.textContent = "";
      nextBtn.disabled = true;
      updateStats();
    }

    function answerQuestion(choice) {
      if (state.answered) return;
      const q = state.session[state.currentIndex];
      const s = statFor(q.id);
      const isCorrect = choice === q.answer;
      state.answered = true;
      state.sessionAnswered += 1;
      s.seen += 1;
      if (isCorrect) {
        state.sessionCorrect += 1;
        state.streak += 1;
        s.correct += 1;
        if (s.correct >= 2) s.mistake = false;
      } else {
        state.streak = 0;
        s.wrong += 1;
        s.mistake = true;
      }
      Array.from(choices.children).forEach(button => {
        button.disabled = true;
        if (button.textContent === q.answer) button.classList.add("correct");
        if (button.textContent === choice && !isCorrect) button.classList.add("wrong");
      });
      resultTitle.textContent = isCorrect ? "正解です" : "不正解です";
      resultNote.textContent = isCorrect ? q.note : `正解は「${q.answer}」です。${q.note}`;
      resultBox.classList.add("show");
      nextBtn.disabled = false;
      progressBar.style.width = `${((state.currentIndex + 1) / state.session.length) * 100}%`;
      saveStore();
      updateStats();
    }

    function nextQuestion() {
      if (state.currentIndex < state.session.length - 1) {
        state.currentIndex += 1;
        renderQuestion();
        return;
      }
      questionText.textContent = `終了です。今回の正解は ${state.sessionCorrect} / ${state.session.length} でした。もう一度回すか、間違えた問題だけ復習してください。`;
      subjectTag.textContent = "結果";
      progressText.textContent = `${state.session.length} / ${state.session.length}`;
      progressBar.style.width = "100%";
      choices.innerHTML = "";
      resultBox.classList.remove("show");
      nextBtn.disabled = true;
    }

    function markCurrentMistake() {
      const q = state.session[state.currentIndex];
      if (!q) return;
      statFor(q.id).mistake = true;
      saveStore();
      updateStats();
    }

    function clearCurrentMistake() {
      const q = state.session[state.currentIndex];
      if (!q) return;
      statFor(q.id).mistake = false;
      saveStore();
      updateStats();
    }

    function updateStats() {
      const values = Object.values(state.store);
      const totalSeen = values.reduce((sum, s) => sum + s.correct + s.wrong, 0);
      const totalCorrect = values.reduce((sum, s) => sum + s.correct, 0);
      const mistakes = state.allQuestions.filter(q => {
        const s = statFor(q.id);
        return s.mistake || s.wrong > 0;
      }).length;
      sessionScore.textContent = `${state.sessionCorrect}/${state.sessionAnswered}`;
      allRate.textContent = totalSeen ? `${Math.round((totalCorrect / totalSeen) * 100)}%` : "0%";
      mistakeCount.textContent = String(mistakes);
      streakCount.textContent = String(state.streak);
    }

    function resetStats() {
      const ok = confirm("成績と復習候補をすべてリセットしますか？");
      if (!ok) return;
      state.store = {};
      saveStore();
      state.sessionCorrect = 0;
      state.sessionAnswered = 0;
      state.streak = 0;
      updateStats();
      startSession();
    }

    state.allQuestions = buildQuestions();
    totalBadge.textContent = `${state.allQuestions.length}問`;
    startBtn.addEventListener("click", startSession);
    resetBtn.addEventListener("click", resetStats);
    nextBtn.addEventListener("click", nextQuestion);
    againBtn.addEventListener("click", markCurrentMistake);
    clearMistakeBtn.addEventListener("click", clearCurrentMistake);
    updateStats();
    startSession();
  </script>
</body>
